<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Scam Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            width: 300px;
            padding: 15px;
            font-family: "Inter", sans-serif;
            background-color: #f8fafc; /* Tailwind gray-50 */
            color: #1e293b; /* Tailwind slate-800 */
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .button {
            background-color: #4f46e5; /* Tailwind indigo-600 */
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background-color 0.3s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .button:hover {
            background-color: #4338ca; /* Tailwind indigo-700 */
            transform: translateY(-1px);
        }
        .button:active {
            transform: translateY(0);
        }
        .message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
            background-color: #e0f2fe; /* Tailwind light blue-100 */
            color: #0c4a6e; /* Tailwind light blue-900 */
            border: 1px solid #7dd3fc; /* Tailwind light blue-300 */
        }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-xl font-bold text-center mb-4">Gmail Scam Detector</h1>
        <button id="scanButton" class="button">
            <span id="buttonText">Scan Open Email</span>
        </button>
        <div id="statusMessage" class="message hidden"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
